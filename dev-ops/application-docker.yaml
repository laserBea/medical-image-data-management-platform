# ==========================================
# Docker 容器环境专用配置
# 用于 Docker Compose 部署场景
# ==========================================

# 服务基本信息（支持环境变量覆盖）
service:
  name: ${SERVICE_NAME:medical-image-data-management-platform}
  version: ${SERVICE_VERSION:0.0.1}

# 服务器配置（支持环境变量覆盖）
server:
  port: ${SERVER_PORT:8080}

# Spring 数据源配置
# 所有数据库连接信息都来自环境变量，由 docker-compose.yml 注入
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# MyBatis 配置
mybatis:
  typeAliasesPackage: com.cloume.rest.app.medicalimagedatamanagementplatform.mybatis.entity
  mapperLocations: classpath:mapper/*.xml

# Spring Boot Actuator 配置
# 用于健康检查和监控
management:
  endpoints:
    web:
      exposure:
        include: health,info
