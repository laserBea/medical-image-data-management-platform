service:
  name: medical-image-data-management-platform
  version: 0.0.1

server:
  port: 8080

# Spring Profile 配置
# 通过环境变量 SPRING_PROFILES_ACTIVE 控制
# 可选值：dev（开发环境）, docker（容器环境）
# 默认值：dev
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

mybatis:
  typeAliasesPackage: com.cloume.rest.app.medicalimagedatamanagementplatform.mybatis.entity
  mapperLocations: classpath:mapper/*.xml

# ==========================================
# 开发环境配置（本地开发使用）
# ==========================================
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/medical_image_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver

# ==========================================
# Docker 容器环境配置（生产环境使用）
# 具体配置在 dev-ops/application-docker.yaml
# ==========================================
---
spring:
  config:
    activate:
      on-profile: docker